services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greencampus
      POSTGRES_USER: greencampus
      POSTGRES_PASSWORD: greencampus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U greencampus" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend (Spring Boot) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: greencampus
      DB_USER: greencampus
      DB_PASS: greencampus
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL_NAME: ${GROQ_MODEL_NAME:-llama3-8b-8192}
      SPRING_PROFILES_ACTIVE: default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend (React + Vite) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
